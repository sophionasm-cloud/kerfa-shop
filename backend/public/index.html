<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/my-project-vue3/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-project-vue3</title>
    <script type="module" crossorigin src="/my-project-vue3/assets/index-BJiVwrba.js"></script>
    <link rel="stylesheet" crossorigin href="/my-project-vue3/assets/index-DOVP0Vsf.css">
  </head>
  <body>
    <div id="app"></div>
    <script>
      const theme = localStorage.getItem('theme');
      if(!theme){
        //if no theme is set, default to dark mode
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }else if (theme === 'dark'){
        document.documentElement.classList.add('dark');
      }else if(theme === 'light'){
        document.documentElement.classList.remove('dark');
      }
    </script>
  </body>
</html>
